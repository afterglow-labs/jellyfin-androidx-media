name: Modernized JDK21 Media3 Extension Build Pipeline

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  modern-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Modern Source Code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive' # Synchronizes upstream media and ffmpeg blocks

    - name: Set up Modern JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21' # Upgraded from 17 to modern LTS standard

    - name: Setup Android SDK Environment
      uses: android-actions/setup-android@v3

    # Upgraded to modern NDK 27 toolchains for optimized compiler routines
    - name: Install Latest Android NDK 27
      run: |
        sdkmanager --install "ndk;27.0.12077973"
        echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/27.0.12077973" >> $GITHUB_ENV

    - name: Enforce Script Execution Permissions
      run: |
        chmod +x ./build.sh
        chmod +x ./gradlew
        chmod +x ./media/libraries/decoder_ffmpeg/src/main/jni/build_ffmpeg.sh

    - name: Inject Dynamic Architecture Paths into Build
      run: |
        # Swaps out Jellyfin's older static string to match your fresh NDK 27 environment path
        sed -i 's|export ANDROID_NDK_PATH=.*|export ANDROID_NDK_PATH='"${ANDROID_NDK_HOME}"'|g' ./build.sh

    - name: Execute Native FFmpeg Media Cross-Compilation
      run: |
        ./build.sh

    - name: Assemble Release AAR via Modern Gradle Core
      run: |
        ./gradlew :media3-ffmpeg-decoder:assembleRelease --no-daemon

    - name: Publish Compiled Player Extension Package
      uses: actions/upload-artifact@v4
      with:
        name: custom-media3-ffmpeg-decoder-aar
        path: media3-ffmpeg-decoder/build/outputs/aar/*.aar
