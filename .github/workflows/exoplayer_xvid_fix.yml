name: Modernized JDK21 Media3 Extension Build Pipeline

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

env:
  NDK_VER: 26.1.10909125
  CMAKE_VER: 3.31.1

jobs:
  modern-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Modern Source Code
      uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      with:
        submodules: 'recursive' # Synchronizes upstream media and ffmpeg blocks

    - name: Set up Modern JDK 21
      uses: actions/setup-java@f2beeb24e141e01a676f977032f5a29d81c9e27e # v5.1.0
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Install correct NDK and CMake
      run: |
        sudo ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --install "ndk;${NDK_VER}" "cmake;${CMAKE_VER}"

    - name: Enforce Script Execution Permissions
      run: |
        chmod +x ./build.sh
        chmod +x ./gradlew
        chmod +x ./media/libraries/decoder_ffmpeg/src/main/jni/build_ffmpeg.sh

    - name: Execute Native FFmpeg Media Cross-Compilation
      run: |
        ./build.sh

    - name: Assemble Release AAR via Modern Gradle Core
      run: |
        ./gradlew :androidx-media-lib-decoder-ffmpeg:assembleRelease --no-daemon

    - name: Publish Compiled Player Extension Package
      uses: actions/upload-artifact@v4
      with:
        name: custom-media3-ffmpeg-decoder-aar
        path: media/libraries/decoder_ffmpeg/build/outputs/aar/*.aar
